<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎓 고교학점제 진로설계 실습</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌼</text></svg>">

<meta property="og:type" content="website">

<meta name="twitter:image" content="https://loveria3.github.io/profile/assets/portrait.png">
<style>
/* ── CSS Variables ──────────────────────── */
:root{
  --p:#6366f1;--pd:#4f46e5;--vio:#8b5cf6;
  --em:#10b981;--am:#f59e0b;--ro:#f43f5e;
  --s9:#0f172a;--s7:#334155;--s5:#64748b;--s4:#94a3b8;
  --s3:#cbd5e1;--s2:#e2e8f0;--s1:#f1f5f9;
  --r1:8px;--r2:14px;--r3:20px;
  --sh1:0 1px 6px rgba(0,0,0,.06);
  --sh2:0 4px 18px rgba(0,0,0,.09);
  --sh3:0 8px 32px rgba(0,0,0,.14)
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Apple SD Gothic Neo','Malgun Gothic',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:linear-gradient(145deg,#ede9fe 0%,#e0f2fe 45%,#f0fdf4 100%);
  background-attachment:fixed;
  min-height:100vh;color:var(--s9)
}
#app{max-width:960px;margin:0 auto;padding:14px}

/* ── Header ─────────────────────────────── */
.hdr{
  background:linear-gradient(135deg,#3730a3 0%,#4f46e5 45%,#7c3aed 100%);
  color:#fff;border-radius:var(--r3);padding:18px 22px;margin-bottom:12px;
  text-align:center;
  box-shadow:0 8px 30px rgba(79,70,229,.45),inset 0 1px 0 rgba(255,255,255,.18);
  position:relative;overflow:hidden
}
.hdr::before{
  content:'';position:absolute;top:-40%;right:-8%;
  width:55%;height:180%;border-radius:50%;
  background:radial-gradient(ellipse,rgba(255,255,255,.13) 0%,transparent 65%);
  pointer-events:none
}
.hdr-sub{font-size:.7rem;opacity:.72;margin-bottom:3px;letter-spacing:.06em;text-transform:uppercase;font-weight:600;position:relative}
.hdr h1{font-size:1.22rem;font-weight:900;margin-bottom:3px;text-shadow:0 1px 4px rgba(0,0,0,.25);position:relative}
.hdr p{font-size:.8rem;opacity:.87;position:relative}
.prog-wrap{background:rgba(255,255,255,.22);border-radius:10px;height:5px;margin-top:10px;overflow:hidden;position:relative}
.prog-fill{background:linear-gradient(90deg,rgba(255,255,255,.6),#fff);border-radius:10px;height:100%;transition:width .5s ease}

/* ── Steps dots ─────────────────────────── */
.steps{display:flex;justify-content:center;align-items:center;gap:5px;margin-bottom:12px}
.sdot{width:7px;height:7px;border-radius:50%;background:#c7d2fe;transition:all .35s cubic-bezier(.4,0,.2,1)}
.sdot.active{background:var(--p);width:22px;border-radius:4px}

/* ── Cards ───────────────────────────────── */
.card{
  background:rgba(255,255,255,.93);backdrop-filter:blur(8px);
  border-radius:var(--r2);padding:18px;margin-bottom:10px;
  box-shadow:var(--sh2);border:1px solid rgba(255,255,255,.85)
}
.card h2{font-size:1rem;font-weight:800;margin-bottom:6px;display:flex;align-items:center;gap:7px;color:var(--s9)}

/* ── Buttons ──────────────────────────────── */
.btn{
  padding:9px 18px;border:none;border-radius:var(--r1);cursor:pointer;
  font-size:.88rem;font-weight:700;
  transition:all .18s cubic-bezier(.4,0,.2,1);
  font-family:inherit;display:inline-flex;align-items:center;
  justify-content:center;gap:6px;letter-spacing:-.01em
}
.btn:active{transform:scale(.96)}
.btn-primary{
  background:linear-gradient(135deg,var(--pd),var(--vio));color:#fff;
  box-shadow:0 3px 12px rgba(79,70,229,.42)
}
.btn-primary:hover{filter:brightness(1.09);box-shadow:0 5px 18px rgba(79,70,229,.55)}
.btn-secondary{background:var(--s1);color:var(--s7)}
.btn-secondary:hover{background:var(--s2)}
.btn-outline{background:#fff;border:2px solid var(--p);color:var(--p)}
.btn-outline:hover{background:#eef2ff}
.btn-block{width:100%;display:block;padding:13px;font-size:.97rem;text-align:center}
.btn-sm{padding:6px 12px;font-size:.78rem;border-radius:7px}

/* ── Utilities ───────────────────────────── */
.divider{height:1px;background:var(--s2);margin:10px 0}
.nav-row{display:flex;gap:8px;margin-top:10px}
.hi-box{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:1px solid #86efac;border-radius:var(--r1);padding:12px 15px;margin-bottom:10px}
.info-box{background:#eff6ff;border:1px solid #93c5fd;border-radius:var(--r1);padding:10px 14px;margin-bottom:10px;font-size:.8rem;color:#1e40af;line-height:1.6}
.warn-box{background:#fff7ed;border:1px solid #fed7aa;border-radius:var(--r1);padding:10px 14px;margin-bottom:10px;font-size:.8rem;color:#9a3412;line-height:1.6}
.success-box{background:#f0fdf4;border:1px solid #86efac;border-radius:var(--r1);padding:10px 14px;margin-bottom:10px;font-size:.8rem;color:#166534;line-height:1.6}

/* ── School select ───────────────────────── */
.school-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:10px}
.school-card{
  border:2px solid var(--s2);border-radius:var(--r2);padding:16px 12px;
  cursor:pointer;text-align:center;
  transition:all .22s cubic-bezier(.4,0,.2,1);background:#fff;position:relative;overflow:hidden
}
.school-card:hover{border-color:var(--p);transform:translateY(-2px);box-shadow:var(--sh2)}
.school-card.sel{border-color:var(--pd);box-shadow:0 0 0 3px rgba(99,102,241,.2),var(--sh1)}
.school-card .s-name{font-size:.88rem;font-weight:800;color:var(--s9);margin-top:8px;margin-bottom:2px}
.school-card .s-loc{font-size:.68rem;color:var(--s4)}
.school-badge{
  position:absolute;top:8px;right:8px;font-size:.6rem;font-weight:700;
  background:linear-gradient(135deg,var(--pd),var(--vio));color:#fff;
  padding:2px 6px;border-radius:5px;letter-spacing:.03em
}
.add-school-btn{
  border:2px dashed var(--s3);border-radius:var(--r2);padding:16px 12px;
  cursor:pointer;text-align:center;background:#fafafa;color:var(--s5);transition:all .22s
}
.add-school-btn:hover{border-color:var(--p);color:var(--p);background:#eef2ff}
.pdf-school-btn{
  border:2px dashed #a5b4fc;border-radius:var(--r2);padding:14px 12px;
  cursor:pointer;text-align:center;
  background:linear-gradient(135deg,#eef2ff,#f5f3ff);color:var(--pd);
  transition:all .22s;grid-column:1/-1
}
.pdf-school-btn:hover{border-color:var(--pd);background:linear-gradient(135deg,#e0e7ff,#ede9fe);box-shadow:var(--sh1)}

/* ── Career mode tabs ───────────────────── */
.mode-tabs{display:flex;gap:4px;margin-bottom:12px;background:rgba(0,0,0,.06);padding:4px;border-radius:14px}
.mtab{
  flex:1;padding:10px 5px;text-align:center;border-radius:10px;cursor:pointer;
  font-size:.76rem;color:var(--s5);transition:all .22s cubic-bezier(.4,0,.2,1);
  font-weight:600;line-height:1.35;
}
.mtab.active{
  background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;
  box-shadow:0 4px 14px rgba(79,70,229,.35);font-weight:800;
  transform:translateY(-1px);
}
.mtab:not(.active):hover{background:rgba(255,255,255,.6);color:var(--pd)}
.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:10px}
.cat-card{
  border:2px solid var(--s2);border-radius:14px;padding:14px 10px;
  cursor:pointer;text-align:center;transition:all .22s cubic-bezier(.4,0,.2,1);
  background:#fff;position:relative;overflow:hidden;
}
.cat-card::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .22s;
  background:linear-gradient(135deg,#eef2ff,#f5f3ff)}
.cat-card:hover::before,.cat-card.sel::before{opacity:1}
.cat-card:hover,.cat-card.sel{border-color:var(--p);transform:translateY(-2px);box-shadow:0 6px 18px rgba(99,102,241,.18)}
.cat-card>*{position:relative;z-index:1}
.cat-emoji{font-size:1.8rem;display:block;margin-bottom:5px}
.cat-name{font-size:.82rem;font-weight:800;color:var(--s9)}
.cat-desc{font-size:.67rem;color:var(--s4);margin-top:2px}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.chip{padding:5px 13px;border-radius:20px;border:2px solid #c7d2fe;background:#eef2ff;color:var(--p);cursor:pointer;font-size:.8rem;transition:all .2s;font-weight:600}
.chip:hover,.chip.sel{background:var(--pd);color:#fff;border-color:var(--pd);transform:translateY(-1px);box-shadow:0 3px 8px rgba(79,70,229,.3)}
.s-box input{width:100%;padding:11px 14px;border:2px solid var(--s2);border-radius:10px;font-size:.92rem;outline:none;transition:all .2s;font-family:inherit;background:#fafafa}
.s-box input:focus{border-color:var(--p);background:#fff;box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.s-results{border:1px solid var(--s2);border-radius:10px;overflow:hidden;margin-top:6px;background:#fff}
.s-item{padding:10px 14px;cursor:pointer;font-size:.85rem;border-bottom:1px solid var(--s1);display:flex;justify-content:space-between;align-items:center;transition:all .15s}
.s-item:hover{background:#eef2ff;color:var(--p);padding-left:18px}
.guided-opt{
  text-align:left;padding:15px 18px 15px 16px;font-size:.88rem;margin-bottom:8px;
  width:100%;display:flex;align-items:center;justify-content:flex-start;gap:10px;
  border-radius:14px;border:2px solid var(--s2);background:#fff;
  transition:all .22s cubic-bezier(.4,0,.2,1);color:var(--s7);font-weight:600;
  box-shadow:0 1px 5px rgba(0,0,0,.04);
}
.guided-opt:hover{
  border-color:var(--p);
  background:linear-gradient(135deg,#eef2ff 0%,#f5f3ff 100%);
  transform:translateX(6px);
  box-shadow:0 6px 20px rgba(99,102,241,.2);
  color:var(--pd);
}
.guided-opt:active{transform:translateX(6px) scale(.98)}
.guided-opt .opt-arrow{margin-left:auto;opacity:0;font-size:1rem;transition:opacity .18s,transform .18s;transform:translateX(-4px)}
.guided-opt:hover .opt-arrow{opacity:1;transform:translateX(0)}

/* ── Semester tabs ─────────────────────── */
.sem-tabs{display:flex;gap:3px;margin-bottom:10px;background:var(--s1);padding:3px;border-radius:10px;flex-wrap:wrap}
.stab{flex:1;min-width:80px;padding:8px 4px;text-align:center;border-radius:7px;cursor:pointer;font-size:.78rem;font-weight:600;color:var(--s5);transition:all .2s;line-height:1.3}
.stab.active{background:#fff;color:var(--pd);box-shadow:0 1px 5px rgba(0,0,0,.08);font-weight:800}
.stab-sub{font-size:.6rem;opacity:.75;margin-top:1px}

/* ── Credit bar ─────────────────────────── */
.cr-bar{
  position:sticky;top:6px;z-index:100;
  background:rgba(255,255,255,.93);backdrop-filter:blur(12px);
  border-radius:14px;padding:10px 15px;
  box-shadow:0 4px 22px rgba(0,0,0,.12),0 0 0 1px rgba(255,255,255,.5);
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;border:1px solid rgba(99,102,241,.12)
}
.cr-num{font-size:1.25rem;font-weight:900;background:linear-gradient(135deg,var(--pd),var(--vio));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.cr-lbl{font-size:.65rem;color:var(--s4);margin-top:1px;font-weight:600}
.cr-status{font-size:.75rem;font-weight:700;padding:5px 10px;border-radius:8px}
.st-under{background:#fef3c7;color:#92400e}
.st-ok{background:#d1fae5;color:#065f46}
.st-over{background:#dbeafe;color:#1e40af}

/* ── Subject cards ──────────────────────── */
.sec-hdr{background:linear-gradient(135deg,#f5f3ff,#ede9fe);border-radius:10px;padding:10px 13px;margin-bottom:7px;border-left:4px solid var(--p)}
.sec-hdr h3{font-size:.88rem;color:#4338ca;font-weight:800}
.sec-hdr p{font-size:.72rem;color:#6d28d9;margin-top:1px}
.req-banner{background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:8px 12px;margin-bottom:8px;font-size:.76rem;color:#991b1b;line-height:1.5}
.elec-banner{background:#eff6ff;border:1px solid #93c5fd;border-radius:8px;padding:8px 12px;margin-bottom:8px;font-size:.76rem;color:#1e40af;line-height:1.5}

.sub-card{display:flex;align-items:flex-start;justify-content:space-between;padding:10px 13px;background:#fff;border:2px solid var(--s2);border-radius:11px;margin-bottom:6px;transition:all .22s;gap:8px}
.sub-card.mandatory{background:#fef2f2;border-color:#fca5a5;cursor:default}
.sub-card.school-set{background:#fff9e6;border-color:#fcd34d;cursor:default}
.sub-card.selected{border-color:var(--p);background:#eef2ff;box-shadow:0 0 0 2px rgba(99,102,241,.15)}
.sub-card.recommended{border-color:#10b981;border-width:2px;background:linear-gradient(135deg,#f0fdf4,#ecfdf5)}
.sub-card.recommended.selected{border-color:#059669;border-width:3px;background:#dcfce7}
.sub-card:not(.mandatory):not(.school-set){cursor:pointer}
.sub-card:not(.mandatory):not(.school-set):hover{border-color:#a5b4fc;transform:translateY(-1px);box-shadow:var(--sh1)}
.rec-top-badge{display:inline-flex;align-items:center;gap:4px;background:linear-gradient(135deg,#059669,#10b981);color:#fff;font-size:.7rem;font-weight:700;padding:3px 9px;border-radius:5px;margin-bottom:5px}
.b-rec-star{background:linear-gradient(135deg,#059669,#10b981);color:#fff}

/* ── Grade tabs ─────────────────────────── */
.grade-tabs{display:flex;gap:7px;margin-bottom:12px}
.gtab{flex:1;padding:11px 5px;text-align:center;border-radius:12px;cursor:pointer;border:2px solid var(--s2);background:rgba(255,255,255,.8);transition:all .22s}
.gtab.active{border-color:var(--p);background:linear-gradient(135deg,#eef2ff,#f5f3ff);box-shadow:0 4px 14px rgba(99,102,241,.2)}
.gtab-name{font-size:.9rem;font-weight:800;color:var(--s7)}
.gtab.active .gtab-name{color:var(--pd)}
.gtab-cr{font-size:.7rem;font-weight:700;margin-top:4px}
.sem-section{background:rgba(248,250,252,.9);border-radius:14px;padding:13px;margin-bottom:15px;border:1px solid var(--s2)}
.sem-section-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sem-title{font-size:.95rem;font-weight:900;color:var(--s9)}
.sem-cr-badge{font-size:.82rem;font-weight:700;padding:4px 11px;border-radius:8px}
.sub-left{flex:1}
.sub-name{font-size:.88rem;font-weight:700;color:var(--s9)}
.sub-info{font-size:.7rem;color:var(--s5);margin-top:2px;line-height:1.4}
.sub-why{font-size:.72rem;color:var(--pd);margin-top:4px;background:#eef2ff;padding:3px 8px;border-radius:5px;display:inline-block;line-height:1.4}
.badge{font-size:.66rem;font-weight:700;padding:2px 7px;border-radius:5px;display:inline-block;white-space:nowrap;flex-shrink:0}
.b-req{background:#fca5a5;color:#7f1d1d}
.b-sch{background:#fde68a;color:#78350f}
.b-rec{background:#a7f3d0;color:#064e3b}
.b-elec{background:#c7d2fe;color:#312e81}
.chk{width:21px;height:21px;border:2px solid var(--s3);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .22s;margin-top:1px}
.chk.on{background:var(--p);border-color:var(--p);box-shadow:0 2px 6px rgba(99,102,241,.4)}

/* ── Area guide ─────────────────────────── */
.area-group{margin-bottom:15px}
.area-hdr{display:flex;justify-content:space-between;align-items:center;background:var(--s1);border-left:4px solid var(--p);border-radius:0 8px 8px 0;padding:8px 12px;margin-bottom:5px}
.area-name{font-size:.87rem;font-weight:800;color:var(--s9)}
.area-rec{font-size:.7rem;background:#e0e7ff;color:#3730a3;padding:2px 7px;border-radius:5px;margin-left:6px;font-weight:600}
.area-cnt{font-size:.73rem;font-weight:700;padding:3px 9px;border-radius:7px;background:var(--s2);color:var(--s5)}
.area-cnt.ok{background:#d1fae5;color:#065f46}
.area-cnt.over{background:#dbeafe;color:#1e40af}
.area-hint{font-size:.73rem;color:var(--s5);padding:5px 12px 7px;background:#fafafa;border-radius:0 0 7px 7px;margin-bottom:5px;line-height:1.5;border:1px solid #f0f0f0;border-top:none}

/* ── Credit summary table ────────────────── */
.cr-table{width:100%;border-collapse:collapse;font-size:.8rem;margin-top:8px}
.cr-table th{background:#f5f3ff;color:#4338ca;font-weight:700;padding:8px 9px;text-align:center;border:1px solid #e5e7eb}
.cr-table td{padding:7px 9px;border:1px solid #f0f0f0;text-align:center;color:var(--s7)}
.cr-table tr:nth-child(even) td{background:#fafafa}
.cr-table .total-row td{background:linear-gradient(135deg,var(--pd),var(--vio));color:#fff;font-weight:800}
.cr-ok{color:#059669;font-weight:700}
.cr-under{color:#d97706;font-weight:700}

/* ── Progress overview ──────────────────── */
.prog-overview{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:13px}
.po-card{background:rgba(255,255,255,.88);border-radius:12px;padding:11px;text-align:center;box-shadow:var(--sh1);border:1px solid var(--s2)}
.po-label{font-size:.68rem;color:var(--s4);margin-bottom:4px;font-weight:600}
.po-val{font-size:1.15rem;font-weight:900;background:linear-gradient(135deg,var(--pd),var(--vio));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.po-sub{font-size:.63rem;color:var(--s4);margin-top:2px}

/* ── Add school form ─────────────────────── */
.form-group{margin-bottom:11px}
.form-label{font-size:.82rem;font-weight:700;color:var(--s7);margin-bottom:5px;display:block}
.form-input{width:100%;padding:10px 13px;border:2px solid var(--s2);border-radius:9px;font-size:.88rem;font-family:inherit;outline:none;transition:all .2s;background:#fafafa}
.form-input:focus{border-color:var(--p);background:#fff;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.form-hint{font-size:.72rem;color:var(--s4);margin-top:3px}

/* ── PDF Upload ──────────────────────────── */
.pdf-drop-zone{
  border:2px dashed #a5b4fc;border-radius:16px;padding:36px 20px;text-align:center;
  background:linear-gradient(135deg,#eef2ff,#f5f3ff);cursor:pointer;
  transition:all .25s;margin:12px 0;display:block
}
.pdf-drop-zone:hover,.pdf-drop-zone.drag-over{
  border-color:var(--p);background:linear-gradient(135deg,#e0e7ff,#ede9fe);
  box-shadow:0 4px 22px rgba(99,102,241,.22)
}
.pdf-drop-icon{font-size:2.8rem;margin-bottom:10px;display:block}
.pdf-parse-table{width:100%;border-collapse:collapse;font-size:.78rem;margin-top:8px}
.pdf-parse-table th{background:#f5f3ff;color:#4338ca;font-weight:700;padding:7px 8px;text-align:center;border:1px solid #e5e7eb}
.pdf-parse-table td{padding:5px 6px;border:1px solid #f0f0f0;vertical-align:middle}
.pdf-parse-table input,.pdf-parse-table select{
  width:100%;border:1px solid var(--s2);border-radius:4px;
  padding:3px 5px;font-size:.76rem;font-family:inherit;outline:none;background:#fff
}
.pdf-parse-table input:focus,.pdf-parse-table select:focus{border-color:var(--p)}
.pdf-parse-row-del{
  width:22px;height:22px;border-radius:50%;border:none;
  background:#fee2e2;color:#ef4444;cursor:pointer;font-size:.8rem;
  display:flex;align-items:center;justify-content:center;margin:auto;transition:background .15s
}
.pdf-parse-row-del:hover{background:#fca5a5}

/* ── Animations ─────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.screen{animation:fadeUp .28s ease}
.spin{animation:spin 1s linear infinite;display:inline-block}

/* ── Print / PDF ────────────────────────── */
@media print{
  body{background:#fff}
  #app{max-width:100%;padding:0}
  .no-print{display:none!important}
  .hdr{border-radius:0;margin-bottom:8px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .card,.cr-bar,.tbl-wrap,.cr-table,.cr-table th,.cr-table td{box-shadow:none!important}
  .screen{animation:none}
  details{display:block}
  details>summary{display:none}
  details[open]>*:not(summary){display:block}
  .nav-row,.btn,.tbl-filter-bar,.grade-tabs,.mode-tabs,.sem-tabs,.steps,.prog-wrap,.warn-box,.info-box{display:none!important}
  .tbl-wrap{overflow:visible}
  .sub-table{font-size:.72rem}
  @page{margin:12mm;size:A4}
}

function getSchool(){
  if(!S.schoolId) return null;
  if(SCHOOLS_DB[S.schoolId]) return SCHOOLS_DB[S.schoolId];
  return S.customSchools[S.schoolId]||null;
}

function allSchools(){
  return [
    ...Object.entries(SCHOOLS_DB).map(([id,sc])=>({id,...sc})),
    ...Object.entries(S.customSchools).map(([id,sc])=>({id,...sc})),
  ];
}

function semSubjects(sem){
  const sc=getSchool();
  if(!sc) return [];
  return sc.subjects.filter(s=>s.sem===sem);
}

// 학년 단위 helpers
function gradeSubjects(grade){
  const sc=getSchool();
  if(!sc) return [];
  return sc.subjects.filter(s=>s.sem.startsWith(grade+'-'));
}

// 교과 이수 여부: mandatory·school은 자동 이수, student는 S.sel 기준
function isEarned(s){
  return s.type==='mandatory'||s.type==='school'||!!S.sel[s.id];
}

function totalCredits(){
  const sc=getSchool();
  if(!sc) return 0;
  // 교과 이수학점 + 창체 18학점(학기당 3학점×6학기, 자동포함)
  const subCr=sc.subjects.filter(s=>isEarned(s)).reduce((a,s)=>a+s.cr,0);
  return subCr + 18;
}

function semCredits(sem){
  const sc=getSchool();
  if(!sc) return 0;
  const subCr=sc.subjects.filter(s=>s.sem===sem&&isEarned(s)).reduce((a,s)=>a+s.cr,0);
  return subCr + CCHA_PER_SEM;
}

function semTarget(sem){
  const sc=getSchool();
  if(!sc) return 32;
  return (sc.semTarget||{})[sem]||32;
}

// 학년별 총 학점 (교과 + 창체)
function gradeCredits(grade){
  const sc=getSchool();
  if(!sc) return 0;
  const subCr=sc.subjects.filter(s=>s.sem.startsWith(grade+'-')&&isEarned(s)).reduce((a,s)=>a+s.cr,0);
  return subCr + CCHA_PER_SEM*2; // 학년당 2학기 × 3학점
}

// 학년별 목표 학점
function gradeTarget(grade){
  const sc=getSchool();
  if(!sc) return 66;
  const t=sc.semTarget||{};
  return (t[grade+'-1']||32)+(t[grade+'-2']||32)+CCHA_PER_SEM*2;
}

function initSchoolSel(schoolId){
  const sc=SCHOOLS_DB[schoolId]||S.customSchools[schoolId];
  if(!sc) return;
  const newSel={};
  sc.subjects.forEach(s=>{
    if(s.type==='mandatory') newSel[s.id]=true;
    else if(s.type==='school') newSel[s.id]=true; // 학교지정도 기본 선택
    else newSel[s.id]=false;
  });
  S.sel=newSel;
  S.schoolId=schoolId;
}

function recSubjects(){
  const sc=getSchool();
  if(!sc||!S.career) return sc?sc.subjects.filter(s=>s.type==='student'):[];
  return sc.subjects.filter(s=>s.type==='student'&&s.tags&&s.tags.includes(S.career.cat));
}

function getWhy(s){
  if(s.why) return s.why;
  if(S.career&&CAT_WHY[S.career.cat]&&CAT_WHY[S.career.cat][s.area])
    return CAT_WHY[S.career.cat][s.area];
  return null;
}

function set(upd,noRender){
  Object.assign(S,upd);
  if(!noRender) render();
}

}

async function loadScript(src){
  return new Promise((resolve,reject)=>{
    if(document.querySelector(`script[src="${src}"]`)){resolve();return;}
    const s=document.createElement('script');
    s.src=src;s.onload=resolve;s.onerror=reject;
    document.head.appendChild(s);
  });
}

async function handlePdfUpload(file){
  if(!file) return;
  const statusEl=document.getElementById('pdf-status');
  if(!statusEl) return;
  statusEl.innerHTML='<div class="info-box" style="display:flex;align-items:center;gap:8px"><span class="spin">⏳</span> PDF를 읽는 중... 잠시만 기다려주세요.</div>';
  try{
    // PDF.js 동적 로드
    if(!window.pdfjsLib){
      await loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
      window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }
    const ab=await file.arrayBuffer();
    const pdf=await window.pdfjsLib.getDocument({data:ab}).promise;
    let fullText='';
    const pageTexts=[];
    for(let i=1;i<=Math.min(pdf.numPages,20);i++){
      const page=await pdf.getPage(i);
      const content=await page.getTextContent();
      // 위치 정보를 활용해 줄 단위로 그룹화
      const items=content.items.filter(it=>it.str.trim());
      // Y좌표 기준 정렬 → 같은 줄끼리 묶기
      const lines={};
      items.forEach(it=>{
        const y=Math.round(it.transform[5]/4)*4; // 4px 단위로 반올림
        if(!lines[y]) lines[y]=[];
        lines[y].push({x:it.transform[4],str:it.str});
      });
      const sortedLines=Object.keys(lines).sort((a,b)=>b-a)
        .map(y=>lines[y].sort((a,b)=>a.x-b.x).map(it=>it.str).join(' '));
      pageTexts.push(sortedLines.join('\n'));
    }
    fullText=pageTexts.join('\n--- 페이지 구분 ---\n');

    const subjects=parseCurriculumPdf(fullText);
    if(subjects.length===0){
      statusEl.innerHTML='<div class="warn-box">⚠️ 과목 정보를 자동으로 인식하지 못했어요.<br>스캔 PDF이거나 표 형식이 아닐 수 있어요.<br>아래 <strong>직접 입력</strong>으로 과목을 추가해 주세요.</div>';
      const el=document.getElementById('pdf-result');
      if(el){S._pdfSubjects=[];el.innerHTML=rPdfResultEditor([]);}
      return;
    }
    statusEl.innerHTML=`<div class="success-box">✅ <strong>${subjects.length}개 과목</strong>을 인식했어요! 아래에서 확인·수정할 수 있어요.</div>`;
    S._pdfSubjects=[...subjects];
    const el=document.getElementById('pdf-result');
    if(el) el.innerHTML=rPdfResultEditor(subjects);
  }catch(e){
    statusEl.innerHTML=`<div class="warn-box">❌ PDF 읽기 실패: ${e.message||'알 수 없는 오류'}<br>다른 PDF를 시도하거나 <strong>직접 입력</strong>을 이용해 주세요.</div>`;
    console.error('PDF parse error:',e);
  }
}

function parseCurriculumPdf(text){
  const subjects=[];
  const lines=text.split('\n').map(l=>l.trim()).filter(l=>l.length>0);

  // 교과(군) 키워드
  const AREA_KW={
    '국어':'국어','수학':'수학','영어':'영어','한국사':'사회',
    '사회':'사회','역사':'사회','도덕':'사회','윤리':'사회',
    '과학':'과학','물리':'과학','화학':'과학','생명':'과학','지구':'과학',
    '체육':'체육','예술':'예술','음악':'예술','미술':'예술',
    '기술':'기술정보','가정':'기술정보','정보':'기술정보',
    '제2외국어':'제2외국어','일본어':'제2외국어','중국어':'제2외국어',
    '스페인':'제2외국어','프랑스':'제2외국어','독일':'제2외국어',
    '교양':'교양','진로':'교양','철학':'교양','논리':'교양',
    '심리':'교양','보건':'교양','환경':'교양'
  };

  // 학기 패턴
  const SEM_RE=/([1-3])\s*학년\s*([1-2])\s*학기|([1-3])\s*[-·]\s*([1-2])/;
  // 과목명 패턴 (한글 2~15자, 숫자/기호 포함 가능)
  const SUB_RE=/^([가-힣·\s\dⅠⅡⅢⅣ①②③]+?)\s+(\d+)\s*$/;
  // 학점/이수단위 뒤에 따라오는 경우
  const SUB_RE2=/([가-힣·\s\dⅠⅡⅢⅣ①②③]{2,15}?)\s{2,}(\d)\s/;

  let currentSem='1-1';
  let currentArea='국어';
  let subId=0;

  for(let i=0;i<lines.length;i++){
    const line=lines[i];

    // 학기 감지
    const semM=line.match(SEM_RE);
    if(semM){
      const g=semM[1]||semM[3];const s=semM[2]||semM[4];
      if(g&&s) currentSem=`${g}-${s}`;
    }

    // 교과군 감지
    for(const [kw,area] of Object.entries(AREA_KW)){
      if(line.startsWith(kw)||line===kw){currentArea=area;break;}
    }

    // 과목명+학점 패턴1: "과목명  숫자" (줄 끝)
    const m1=line.match(SUB_RE);
    if(m1){
      const name=m1[1].trim().replace(/\s+/g,' ');
      const cr=parseInt(m1[2]);
      if(name.length>=2&&name.length<=20&&cr>=1&&cr<=8
         &&/[가-힣]/.test(name)&&!name.match(/^(학년|학기|학교|교과|과목|이수|단위|합계|소계|총계|선택|필수)$/)){
        subId++;
        subjects.push({
          id:`pdf${subId}`,name,cr,area:currentArea,sem:currentSem,
          type:currentSem.startsWith('1')?'mandatory':'student',
          subtype:'general',tags:[],why:''
        });
      }
    }

    // 과목명+학점 패턴2: 여러 항목이 한 줄에 있는 경우
    if(!m1){
      const parts=line.split(/\s{2,}/);
      for(let j=0;j<parts.length-1;j++){
        const name=parts[j].trim();
        const crStr=parts[j+1]?.trim();
        if(name&&crStr&&/^\d$/.test(crStr)&&/[가-힣]{2,}/.test(name)){
          const cr=parseInt(crStr);
          if(cr>=1&&cr<=8&&name.length>=2&&name.length<=20){
            subId++;
            subjects.push({
              id:`pdf${subId}`,name,cr,area:currentArea,sem:currentSem,
              type:currentSem.startsWith('1')?'mandatory':'student',
              subtype:'general',tags:[],why:''
            });
          }
        }
      }
    }
  }

  // 중복 제거
  const seen=new Set();
  return subjects.filter(s=>{
    const key=s.name+s.sem;
    if(seen.has(key)) return false;
    seen.add(key);return true;
  });
}

function rPdfResultEditor(subjects){
  const AREAS=['국어','수학','영어','사회','과학','체육','예술','기술정보','제2외국어','교양'];
  const SEMS=['1-1','1-2','2-1','2-2','3-1','3-2'];
  const TYPES=['mandatory','school','student'];
  const TYPE_LABELS={'mandatory':'공통필수','school':'학교지정','student':'학생자율'};
  const areaOpts=AREAS.map(a=>`<option value="${a}">${a}</option>`).join('');
  const semOpts=SEMS.map(s=>`<option value="${s}">${s}학기</option>`).join('');
  const typeOpts=TYPES.map(t=>`<option value="${t}">${TYPE_LABELS[t]}</option>`).join('');

  const rows=(subjects||[]).map((s,i)=>`
    <tr id="pdf-row-${i}">
      <td><input class="pdf-subname" data-i="${i}" value="${s.name||''}" placeholder="과목명" style="width:100%;min-width:100px"></td>
      <td><input type="number" class="pdf-subcr" data-i="${i}" value="${s.cr||4}" min="1" max="8" style="width:44px;text-align:center"></td>
      <td><select class="pdf-subarea" data-i="${i}">${AREAS.map(a=>`<option value="${a}"${a===s.area?' selected':''}>${a}</option>`).join('')}</select></td>
      <td><select class="pdf-subsem" data-i="${i}">${SEMS.map(se=>`<option value="${se}"${se===s.sem?' selected':''}>${se}</option>`).join('')}</select></td>
      <td><select class="pdf-subtype" data-i="${i}">${TYPES.map(t=>`<option value="${t}"${t===s.type?' selected':''}>${TYPE_LABELS[t]}</option>`).join('')}</select></td>
      <td><button class="pdf-parse-row-del" onclick="pdfDelRow(${i})" title="삭제">✕</button></td>
    </tr>`).join('');

  return `<div style="margin-top:12px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:7px">
      <div style="font-size:.88rem;font-weight:800;color:var(--s9)">📋 인식된 과목 목록 (${subjects.length}개)</div>
      <button class="btn btn-outline btn-sm" onclick="pdfAddRow()">+ 행 추가</button>
    </div>

    <div style="background:#fffbeb;border:1px solid #fcd34d;border-radius:8px;padding:8px 12px;margin-bottom:8px;font-size:.76rem;color:#92400e">
      ⚠️ 자동 인식 결과를 반드시 확인하세요. 과목명·학점·학기가 틀릴 수 있어요.
    </div>

    <div style="overflow-x:auto;border-radius:10px;border:1px solid var(--s2)">
      <table class="pdf-parse-table" id="pdf-parse-tbl">
        <thead><tr><th>과목명</th><th>학점</th><th>교과군</th><th>학기</th><th>유형</th><th>삭제</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>

    <div class="form-group" style="margin-top:12px">
      <label class="form-label">학교 이름 *</label>
      <input class="form-input" id="pdf-school-name" type="text" placeholder="예: ○○고등학교">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">약칭</label>
        <input class="form-input" id="pdf-school-short" type="text" placeholder="예: ○○고">
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">지역</label>
        <input class="form-input" id="pdf-school-loc" type="text" placeholder="예: 제주시">
      </div>
    </div>
    <button class="btn btn-primary btn-block" style="margin-top:12px" onclick="savePdfSchool()">
      🏫 이 편제표로 학교 추가하기
    </button>
  </div>`;
}

function pdfDelRow(i){
  if(!S._pdfSubjects) return;
  S._pdfSubjects.splice(i,1);
  const el=document.getElementById('pdf-result');
  if(el) el.innerHTML=rPdfResultEditor(S._pdfSubjects);
}

function pdfAddRow(){
  if(!S._pdfSubjects) S._pdfSubjects=[];
  S._pdfSubjects.push({id:'pdfnew'+Date.now(),name:'',cr:4,area:'국어',sem:'2-1',type:'student',subtype:'general',tags:[],why:''});
  const el=document.getElementById('pdf-result');
  if(el) el.innerHTML=rPdfResultEditor(S._pdfSubjects);
}

function pdfCollectData(){
  const subjects=[];
  document.querySelectorAll('#pdf-parse-tbl tbody tr').forEach((tr,i)=>{
    const name=tr.querySelector('.pdf-subname')?.value?.trim();
    const cr=parseInt(tr.querySelector('.pdf-subcr')?.value)||4;
    const area=tr.querySelector('.pdf-subarea')?.value||'국어';
    const sem=tr.querySelector('.pdf-subsem')?.value||'2-1';
    const type=tr.querySelector('.pdf-subtype')?.value||'student';
    if(name) subjects.push({id:'p'+i+'_'+Date.now(),name,cr,area,sem,type,subtype:'general',tags:[],why:''});
  });
  return subjects;
}

function savePdfSchool(){
  const name=document.getElementById('pdf-school-name')?.value?.trim();
  const short=document.getElementById('pdf-school-short')?.value?.trim();
  const loc=document.getElementById('pdf-school-loc')?.value?.trim();
  if(!name){alert('학교 이름을 입력해 주세요!');return;}
  const subjects=pdfCollectData();
  if(subjects.length===0){alert('과목이 하나도 없어요. 과목을 추가해 주세요.');return;}
  const id='pdf_'+Date.now();
  S.customSchools[id]={
    name,short:short||name,emoji:'📄',location:loc||'',
    semTarget:{'1-1':22,'1-2':23,'2-1':32,'2-2':32,'3-1':32,'3-2':33},
    subjects
  };
  alert(`✅ "${name}" 학교를 추가했어요! (${subjects.length}개 과목)`);
  pickSchool(id);
}

        선택과목은 제주사대부고와 동일한 목록으로 시작해요.<br>
        향후 선생님이 직접 과목 목록을 편집하는 기능이 추가될 예정이에요.
      </div>
      <div class="nav-row">

function addSchool(){
  const name=document.getElementById('ns-name')?.value?.trim();
  const loc=document.getElementById('ns-loc')?.value?.trim();
  const short=document.getElementById('ns-short')?.value?.trim();
  if(!name){alert('학교 이름을 입력해 주세요!');return;}
  const id='custom_'+Date.now();
  // Clone jejusadaebugo subjects with new IDs
  const baseSubs=SCHOOLS_DB.jejusadaebugo.subjects.map(s=>({...s,id:s.id+'_c'}));
  S.customSchools[id]={
    name, short:short||name, emoji:'🏫', location:loc||'',
    semTarget:{...SCHOOLS_DB.jejusadaebugo.semTarget},
    subjects:baseSubs
  };
  set({newSchool:{name:'',location:'',short:''}});
  pickSchool(id);
}

function rGuided(){
  if(S.gStep>=GQ.length){
    const sc=S.gScores;
    const sorted=Object.entries(sc).sort((a,b)=>b[1]-a[1]).slice(0,3);
    const top3=sorted.map(([cid])=>CAT.find(c=>c.id===cid)).filter(Boolean);
    // 기본 직업: 상위 2개 분야에서 4개씩
    const topJobs=sorted.slice(0,2).flatMap(([cid])=>(JOBS[cid]||[]).slice(0,4));
    // 더 많은 직업: 상위 3개 분야 전체
    const allRelatedCats=sorted.map(([cid])=>CAT.find(c=>c.id===cid)).filter(Boolean);

    return `<div class="card" style="padding:0;overflow:hidden;border:none">
      <!-- 결과 헤더 -->
      <div style="background:linear-gradient(135deg,#059669,#10b981);padding:18px 20px;color:#fff;text-align:center">
        <div style="font-size:2rem;margin-bottom:6px">🎉</div>
        <div style="font-size:1.05rem;font-weight:800">탐색 완료!</div>
        <div style="font-size:.75rem;opacity:.8;margin-top:3px">나에게 어울리는 진로 분야예요</div>
      </div>
      <div style="padding:16px">
      ${top3.map((cat,i)=>`
        <div style="display:flex;align-items:center;gap:11px;padding:11px 14px;background:${i===0?'linear-gradient(135deg,#f5f3ff,#eef2ff)':'#f9fafb'};border-radius:12px;margin-bottom:7px;border:${i===0?'2px solid #4f46e5':'2px solid #f3f4f6'};transition:transform .2s">
          <div style="width:44px;height:44px;border-radius:12px;background:${i===0?'linear-gradient(135deg,#4f46e5,#7c3aed)':i===1?'linear-gradient(135deg,#0369a1,#0ea5e9)':'linear-gradient(135deg,#059669,#10b981)'};display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0">
            ${cat.emoji}
          </div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:800;font-size:.9rem;color:${i===0?'#3730a3':'#374151'}">${cat.name}</div>
            <div style="font-size:.72rem;color:#6b7280;margin-top:2px">${cat.desc}</div>
          </div>
          ${i===0?`<span style="font-size:.68rem;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;padding:3px 9px;border-radius:20px;font-weight:700;flex-shrink:0">1위 추천</span>`:
            i===1?`<span style="font-size:.68rem;background:#e0f2fe;color:#0369a1;padding:3px 9px;border-radius:20px;font-weight:700;flex-shrink:0">2위</span>`:''}
        </div>`).join('')}

      <p style="font-size:.82rem;font-weight:700;color:#374151;margin:10px 0 7px">✨ 관련 직업 선택</p>
      <div class="chips">
        ${topJobs.map(j=>{
          const c=sorted.find(([cid])=>(JOBS[cid]||[]).includes(j))?.[0]||sorted[0][0];
          return `<span class="chip" data-job="${j}" data-cat="${c}">${j}</span>`;
        }).join('')}
      </div>

      ${S.showMoreJobs?`
        <!-- 더 많은 직업 패널 -->
        <div style="margin-top:12px;background:#f8faff;border-radius:10px;padding:12px;border:1px solid #c7d2fe">
          <div style="font-size:.82rem;font-weight:700;color:#4338ca;margin-bottom:10px">📋 추천 분야별 전체 직업 목록</div>
          ${allRelatedCats.map((cat,i)=>`
            <div style="margin-bottom:10px">
              <div style="font-size:.8rem;font-weight:700;color:#374151;margin-bottom:5px">
                ${cat.emoji} ${cat.name} ${i===0?'<span style="font-size:.68rem;background:#4f46e5;color:#fff;padding:1px 6px;border-radius:4px;margin-left:4px">1위 추천</span>':''}
              </div>
              <div class="chips">
                ${(JOBS[cat.id]||[]).map(j=>`<span class="chip" data-job="${j}" data-cat="${cat.id}">${j}</span>`).join('')}
              </div>
            </div>`).join('')}
          <div style="margin-top:8px;padding-top:8px;border-top:1px solid #e5e7eb">
            <div style="font-size:.8rem;font-weight:700;color:#374151;margin-bottom:5px">🔍 다른 분야도 찾고 싶다면?</div>
            <div style="display:flex;flex-wrap:wrap;gap:5px">
              ${CAT.filter(c=>!allRelatedCats.find(r=>r.id===c.id)).map(c=>`
                <span style="padding:4px 10px;border:1px solid #e5e7eb;border-radius:8px;font-size:.76rem;cursor:pointer;background:#fff" onclick="set({mode:'category',selCat:'${c.id}',showMoreJobs:false})">
                  ${c.emoji} ${c.name}
                </span>`).join('')}
            </div>
          </div>
        </div>
        <button class="btn btn-secondary btn-sm" style="margin-top:8px;width:100%" onclick="set({showMoreJobs:false})">▲ 접기</button>
      `:`
        <button class="btn btn-outline btn-sm" style="margin-top:10px;width:100%" onclick="set({showMoreJobs:true})">
          📋 더 많은 직업 보기 (추천 분야 전체 목록)
        </button>
      `}

      <div style="display:flex;gap:7px;margin-top:10px">
        <button class="btn btn-secondary btn-sm" onclick="set({gStep:0,gScores:{},showMoreJobs:false})">↩ 다시 탐색</button>
        <button class="btn btn-outline btn-sm" onclick="set({mode:'category',selCat:null,showMoreJobs:false})">📂 분야별 직접 선택</button>
      </div>
      </div>
    </div>`;
  }
  const q=GQ[S.gStep];
  const pct=Math.round((S.gStep/GQ.length)*100);
  return `<div class="card" style="padding:0;overflow:hidden;border:none">
    <!-- 그라디언트 헤더 -->
    <div style="background:linear-gradient(135deg,#3730a3 0%,#4f46e5 50%,#7c3aed 100%);padding:22px 20px 20px;color:#fff">
      <!-- 단계 표시 점 -->
      <div style="display:flex;gap:6px;justify-content:center;margin-bottom:14px">
        ${GQ.map((_,i)=>`<div style="height:7px;border-radius:4px;background:${i<S.gStep?'rgba(255,255,255,.55)':i===S.gStep?'#fff':'rgba(255,255,255,.22)'};width:${i===S.gStep?26:7}px;transition:all .3s"></div>`).join('')}
      </div>
      <!-- 질문 번호 + 프로그레스 -->
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span style="font-size:.7rem;opacity:.7;font-weight:600">질문 ${S.gStep+1} / ${GQ.length}</span>
        <span style="font-size:.7rem;opacity:.7;font-weight:600">${pct}% 완료</span>
      </div>
      <div style="background:rgba(255,255,255,.22);border-radius:6px;height:5px;margin-bottom:16px">
        <div style="width:${pct}%;background:#fff;border-radius:6px;height:100%;transition:width .4s cubic-bezier(.4,0,.2,1)"></div>
      </div>
      <!-- 질문 텍스트 -->
      <div style="font-size:1.08rem;font-weight:800;line-height:1.45;text-align:center">${q.q}</div>
    </div>
    <!-- 선택지 -->
    <div style="padding:16px 16px 12px">
      ${q.opts.map(opt=>`<button class="btn guided-opt" data-gans='${JSON.stringify(opt.cats)}'><span>${opt.t}</span><span class="opt-arrow">›</span></button>`).join('')}
    </div>
  </div>`;
}

  return `<div class="card">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      <div style="width:36px;height:36px;background:linear-gradient(135deg,#4f46e5,#7c3aed);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem">🔍</div>

    <!-- 1학년 안내 (선택 불가) -->

    <div class="card" style="background:linear-gradient(135deg,#fffbeb,#fef3c7);border:2px solid #fbbf24;margin-bottom:10px;text-align:center;padding:20px 16px">

      <span style="display:inline-block;width:10px;height:10px;background:#fff7ed;border-left:3px solid #f59e0b;vertical-align:middle;margin-right:3px"></span> ◻️ 미선택 &nbsp;

      <span class="badge-type badge-fusion-t">융합</span> 융합선택 &nbsp;

// ── 과목 한 행 렌더링 (6열) ──────────────────────────────
// grp: {color, isFirst, isLast} — 선택군 박스 테두리용, null이면 테두리 없음
function renderSubRow(s,recIds,grade,grp=null){
  const on=S.sel[s.id];
  const locked=s.type==='mandatory';
  const school=s.type==='school';
  const canClick=!locked&&!school&&grade!==1;
  const isRec=recIds.has(s.id);
  const rowClass=locked?'mandatory-row':school?'school-row':isRec&&on?'rec-sel-row':isRec?'rec-row':on?'sel-row':'';
  const typBadge=s.subtype==='career'?'badge-career-t':s.subtype==='fusion'?'badge-fusion-t':'badge-common-t';
  const typLabel=s.subtype==='common'?'공통':s.subtype==='career'?'진로':s.subtype==='fusion'?'융합':'일반';
  const why=getWhy(s);

  // 선택군 박스 테두리 스타일 (left·right + 첫행 top, 마지막행 bottom)
  const bL=grp?`border-left:2.5px solid ${grp.color};`:'';
  const bR=grp?`border-right:2.5px solid ${grp.color};`:'';
  const bT=grp&&grp.isFirst?`border-top:2px solid ${grp.color};`:'';
  const bB=grp&&grp.isLast?`border-bottom:2.5px solid ${grp.color};`:'';
  const cellBase=bL+bR+bT+bB;  // 모든 td 공통 테두리

  return `<tr class="${rowClass}${canClick?' clickable':''}" ${canClick?`onclick="toggleSub('${s.id}')"`:''}}>
    <td style="text-align:center;${cellBase}">
      ${locked||school||grade===1
        ?`<div class="tbl-chk locked">✓</div>`
        :`<div class="tbl-chk${on?' on':''}" onclick="event.stopPropagation();toggleSub('${s.id}')">${on?'✓':''}</div>`}
    </td>
    <td style="${cellBase}">
      ${isRec&&grade!==1?`<div class="rec-label">⭐ ${S.career?.name||'진로'} 추천</div>`:''}
      <strong style="font-size:.84rem">${locked?'🔒 ':school?'🏫 ':''}${s.name}</strong>
      ${why&&!locked?`<div style="font-size:.69rem;color:#4f46e5;margin-top:2px;line-height:1.4">💡 ${why}</div>`:''}
      ${PREREQ_MAP[s.name]?`<div style="font-size:.67rem;color:#b45309;background:#fffbeb;border:1px solid #fcd34d;padding:2px 7px;border-radius:5px;margin-top:3px;display:inline-block;line-height:1.5">📋 선수과목: ${PREREQ_MAP[s.name].join(' · ')}</div>`:''}
    </td>
    <td style="font-size:.78rem;color:#374151;white-space:nowrap;${cellBase}">${s.area}</td>
    <td style="white-space:nowrap;${cellBase}">
      <span class="badge-type ${typBadge}">${typLabel}</span>
    </td>
    <td style="font-size:.74rem;color:#6b7280;white-space:nowrap;${cellBase}">${s.sem.endsWith('-1')?'1학기':'2학기'}</td>
    <td style="text-align:right;font-weight:700;font-size:.85rem;color:${on||locked||school?'#4f46e5':'#9ca3af'};${cellBase}">${s.cr}</td>
  </tr>`;
}

// ── 블록 그룹핑 tbody 렌더링 ─────────────────────────────
function renderGroupedRows(filtered,recIds,grade){
  const rows=[];
  const sems=grade===1?['1-1','1-2']:grade===2?['2-1','2-2']:['3-1','3-2'];
  const sc=getSchool();

  for(const sem of sems){
    const semSubs=filtered.filter(s=>s.sem===sem);
    if(!semSubs.length) continue;

    // ① 학기 구분 행 (보라 그라디언트)
    const semLabel=sem.endsWith('-1')?'1학기':'2학기';
    const semCr=semSubs
      .filter(s=>S.sel[s.id]||s.type==='mandatory'||s.type==='school')
      .reduce((a,s)=>a+s.cr,0);
    const semTgt=sc&&sc.semTarget?sc.semTarget[sem]:0;
    const semOk=semCr>=semTgt;
    const semStatusColor=semOk?'#6ee7b7':'#fcd34d';
    const semStatusTxt=semOk?`✅ ${semCr}/${semTgt}학점 완료`:`◻️ ${semCr}/${semTgt}학점 (${semTgt-semCr}학점 부족)`;
    rows.push(`<tr>
      <td colspan="6" style="background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;font-size:.82rem;font-weight:800;padding:9px 13px;letter-spacing:.4px">
        📅 ${grade}학년 ${semLabel}
        <span style="font-size:.71rem;font-weight:700;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);padding:2px 9px;border-radius:20px;margin-left:8px;color:${semStatusColor}">${semStatusTxt}</span>
        <span style="font-size:.68rem;font-weight:500;opacity:.7;margin-left:6px">+ 창체 3학점 자동포함</span>
      </td>
    </tr>`);

    // ② 공통필수·학교지정 블록
    const autoSubs=semSubs.filter(s=>s.type==='mandatory'||s.type==='school');
    if(autoSubs.length){
      const autoCr=autoSubs.reduce((a,s)=>a+s.cr,0);
      rows.push(`<tr>
        <td colspan="6" style="background:#fef2f2;border-left:4px solid #ef4444;border-bottom:1px solid #fca5a5;padding:6px 11px">
          <span style="font-size:.76rem;font-weight:800;color:#991b1b">🔒 공통필수·학교지정 과목</span>
          <span style="font-size:.7rem;color:#b91c1c;margin-left:8px">자동 이수 · ${autoCr}학점</span>
        </td>
      </tr>`);
      autoSubs.forEach(s=>rows.push(renderSubRow(s,recIds,grade)));
    }

    // ③ 각 선택군 블록 (필터 적용: 학기·교과군 필터 시 그룹 일부 과목만 나올 수 있음)
    const allSemSubIds=new Set(sc?sc.subjects.filter(s=>s.sem===sem).map(s=>s.id):[]);
    if(grade!==1&&allSemSubIds.size){
      const grpEntries=Object.entries(COURSE_GROUPS).filter(([,g])=>g.ids.some(id=>allSemSubIds.has(id)));
      for(const [gid,g] of grpEntries){
        const grpSubs=g.ids.map(id=>semSubs.find(s=>s.id===id)).filter(Boolean);
        if(!grpSubs.length) continue;

        const isSingle=g.ids.length===1;
        const selCnt=g.ids.filter(id=>S.sel[id]).length;
        const ok=selCnt>=g.pick;
        const over=selCnt>g.pick;
        // 단일 선택(필수선택)은 항상 초록 처리
        const hBg=isSingle?'#f0fdf4':over?'#dbeafe':ok?'#d1fae5':'#fff7ed';
        const hBorder=isSingle?'#10b981':over?'#3b82f6':ok?'#10b981':'#f59e0b';
        const hColor=isSingle?'#065f46':over?'#1e40af':ok?'#065f46':'#92400e';
        const sIcon=isSingle?'📌':over?'⚠️':ok?'✅':'◻️';
        const sTxt=isSingle?'필수선택':over?`초과 (${selCnt}/${g.pick})`:`${selCnt}/${g.pick} 선택됨`;
        const noteLabel=isSingle?'필수':g.note;

        rows.push(`<tr>
          <td colspan="6" style="background:${hBg};border-left:4px solid ${hBorder};border-bottom:1px solid ${hBorder}55;padding:6px 11px">
            <span style="font-size:.77rem;font-weight:800;color:${hColor}">${sIcon} ${g.label}</span>
            <span style="font-size:.72rem;font-weight:700;background:${hBorder}22;color:${hColor};padding:2px 9px;border-radius:5px;margin-left:7px">${noteLabel}</span>
            <span style="font-size:.7rem;color:${hColor};margin-left:6px">${sTxt}</span>
          </td>
        </tr>`);
        // 선택군 과목: 박스 테두리 (isFirst/isLast로 위·아래 테두리 추가)
        grpSubs.forEach((s,idx)=>rows.push(
          renderSubRow(s,recIds,grade,{color:hBorder,isFirst:idx===0,isLast:idx===grpSubs.length-1})
        ));
        // 선택군 간 공백 행
        rows.push(`<tr><td colspan="6" style="height:4px;background:#f8fafc;padding:0"></td></tr>`);
      }
    }
  }
  return rows.join('');
}

function getGroupNote(s){
  const gid=SUB_TO_GRP[s.id];
  if(!gid) return '<span style="color:#d1d5db;font-size:.72rem">—</span>';
  const g=COURSE_GROUPS[gid];
  const selCnt=g.ids.filter(id=>S.sel[id]).length;
  const ok=selCnt>=g.pick;
  const over=selCnt>g.pick;
  const bg=over?'#dbeafe':ok?'#d1fae5':'#fff7ed';
  const cl=over?'#1e40af':ok?'#065f46':'#92400e';
  const icon=over?'⚠️':ok?'✅':'◻️';
  return `<div style="font-size:.68rem;font-weight:700;padding:3px 7px;border-radius:5px;background:${bg};color:${cl};white-space:nowrap;display:inline-block;line-height:1.5">

    <span style="font-weight:400">(${selCnt}/${g.pick}과목 선택)</span>
  </div>`;
}

function rSubCard(s, isSchool){
  const on=S.sel[s.id];
  const locked=s.type==='mandatory';
  const schoolFixed=s.type==='school';
  const why=getWhy(s);
  const isRec=!locked&&!schoolFixed&&S.career&&s.tags&&s.tags.includes(S.career.cat);
  const typeBadge=locked?'b-req':schoolFixed?'b-sch':isRec?'b-rec-star':'b-elec';
  const typeLabel=locked?'필수':schoolFixed?'학교지정':s.subtype==='career'?'진로선택':s.subtype==='fusion'?'융합선택':'일반선택';
  let cardClass=locked?'mandatory':schoolFixed?'school-set':'';
  if(!locked&&!schoolFixed){
    if(isRec) cardClass='recommended';
    if(on) cardClass+=(cardClass?' ':'')+'selected';
  }
  return `<div class="sub-card ${cardClass}" ${!locked&&!schoolFixed?`onclick="toggleSub('${s.id}')"`:''}>
    <div class="sub-left">
      ${isRec?`<div class="rec-top-badge">⭐ ${S.career.name} 추천 과목</div>`:''}
      <div class="sub-name">${locked?'🔒 ':schoolFixed?'🏫 ':''}${s.name}</div>
      <div class="sub-info">${s.area} · ${s.cr}학점 · ${typeLabel}</div>
      ${why&&!locked?`<div class="sub-why">💡 ${why}</div>`:''}
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
      <span class="badge ${typeBadge}">${isRec?'🌟 추천':typeLabel}</span>
      ${!locked&&!schoolFixed?`<div class="chk${on?' on':''}">
        ${on?'<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>':''}
      </div>`:''}
    </div>
  </div>`;
}

function rAreaGrouped(subjects,isRec){
  const groups={};
  subjects.forEach(s=>{
    if(!groups[s.area])groups[s.area]=[];
    groups[s.area].push(s);
  });
  return Object.entries(groups).map(([area,subs])=>{
    const g=AREA_GUIDE[area]||{rec:'1~2과목',min:0,max:2,hint:'진로에 맞게 선택하세요.'};
    const selCnt=subs.filter(s=>S.sel[s.id]).length;
    const selCr=subs.filter(s=>S.sel[s.id]).reduce((a,s)=>a+s.cr,0);
    const isOk=selCnt>0;
    const isOver=selCnt>g.max;
    const cntClass=selCnt===0?'':isOver?'over':'ok';
    return `<div class="area-group">
      <div class="area-hdr">
        <div><span class="area-name">${area}</span><span class="area-rec">권장 ${g.rec}</span></div>
        <div class="area-cnt ${cntClass}">${selCnt===0?'미선택':`${selCnt}과목 (${selCr}학점)`}</div>
      </div>
      ${g.hint?`<div class="area-hint">${g.hint}</div>`:''}
      ${subs.map(s=>rSubCard(s,false)).join('')}
    </div>`;
  }).join('');
}

function rCrTable(){

            <div style="display:flex;gap:6px;align-items:center">
              <span class="badge ${s.type==='mandatory'?'b-req':s.type==='school'?'b-sch':'b-elec'}">${s.type==='mandatory'?'필수':s.type==='school'?'학교지정':'선택'}</span>
              <span style="font-weight:700;color:#4f46e5;min-width:38px;text-align:right">${s.cr}학점</span>
            </div>
          </div>`).join('')}
          <div style="text-align:right;font-size:.75rem;color:#6b7280;margin-top:3px">교과 ${subs.reduce((a,s)=>a+s.cr,0)}학점 + 창체 ${CCHA_PER_SEM}학점 = ${subs.reduce((a,s)=>a+s.cr,0)+CCHA_PER_SEM}학점</div>
        </div>`;
      }).join('')}
    </div>

    <div class="warn-box">⚠️ 이 목록은 <strong>연습용</strong>입니다. 실제 과목 선택 시 담임·진로 선생님과 상담하세요!</div>

    <!-- PDF 저장 버튼 -->
    <button class="btn btn-primary btn-block no-print" style="margin-bottom:8px;background:linear-gradient(135deg,#dc2626,#ef4444);font-size:1rem" onclick="printDoc()">
      📄 PDF로 저장하기
    </button>
    <div class="nav-row no-print">
      <button class="btn btn-secondary" style="flex:1" onclick="set({screen:'subject_select',grade:3})">← 수정</button>
      <button class="btn btn-primary" style="flex:1" onclick="resetApp()">🔄 처음부터</button>
    </div>
  </div>`;
}

// ============================================================
// EVENTS & ACTIONS
// ============================================================
function attachEv(){
  document.querySelectorAll('[data-job]').forEach(el=>{
    el.addEventListener('click',()=>set({career:{name:el.dataset.job,cat:el.dataset.cat},screen:'career_confirm'}));
  });
  document.querySelectorAll('[data-gans]').forEach(el=>{
    el.addEventListener('click',()=>{
      const cats=JSON.parse(el.dataset.gans);
      const ns={...S.gScores};
      cats.forEach(c=>{ns[c]=(ns[c]||0)+1;});
      set({gScores:ns,gStep:S.gStep+1});
    });
  });
  // PDF drag & drop
  const dz=document.getElementById('pdf-drop-zone');
  if(dz){
    dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over');});
    dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
    dz.addEventListener('drop',e=>{
      e.preventDefault();dz.classList.remove('drag-over');
      const f=e.dataTransfer.files[0];
      if(f&&f.type==='application/pdf') handlePdfUpload(f);
      else alert('PDF 파일만 업로드할 수 있어요.');
    });
  }
}

function doSearch(q){
  const r=ALL_JOBS.filter(j=>j.name.includes(q)).slice(0,8);
  set({searchQ:q,searchR:r},true);
  render();
  setTimeout(()=>{const el=document.getElementById('jSearch');if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);}},0);
}

function pickCustomJob(name){set({career:{name,cat:'hum'},screen:'career_confirm'});}

function toggleSub(id){
  const sc=getSchool();
  if(!sc) return;
  const s=sc.subjects.find(x=>x.id===id);
  if(!s||s.type==='mandatory'||s.type==='school') return; // 필수·학교지정 잠금
  const ns={...S.sel};
  ns[id]=!ns[id];
  const scrollY=window.scrollY;
  set({sel:ns});
  requestAnimationFrame(()=>window.scrollTo(0,scrollY));
}

function doFilterQ(q){
  S.filterQ=q;
  const scrollY=window.scrollY;
  render();
  setTimeout(()=>{
    window.scrollTo(0,scrollY);
    const el=document.getElementById('fq');
    if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);}
  },0);
}

function printDoc(){
  // 현재 화면이 summary가 아니면 summary로 이동 후 출력
  if(S.screen!=='summary') { set({screen:'summary'}); setTimeout(()=>window.print(),400); }
  else window.print();
}

function resetApp(){
  set({screen:'home',schoolId:null,sel:{},career:null,mode:'guided',gStep:0,gScores:{},searchQ:'',searchR:[],selCat:null,grade:1,showMoreJobs:false,newSchool:{name:'',location:'',short:''}});
}

// ============================================================
// INIT
// ============================================================
render();
</script>
